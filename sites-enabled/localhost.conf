<IfModule mod_headers.c>
  Header set Permissions-Policy "browsing-topics=()"
  Header set Strict-Transport-Security: "max-age=31536000; includeSubDomains"
  Header set Content-Security-Policy "default-src 'self' *.sunstarsys.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' snap.licdn.com *.credly.com *.googletagmanager.com vectorgraphics.github.io *.googleadservices.com *.sunstarsys.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com *.sunstarsys.com; frame-src 'self' www.youtube.com *.credly.com; font-src 'self' fonts.googleapis.com fonts.gstatic.com data: *.sunstarsys.com; img-src 'self' px.ads.linkedin.com *.googleusercontent.com *.sunstarsys.com data:; connect-src 'self' www.google-analytics.com analytics.google.com *.googleadservices.com px.ads.linkedin.com *.sunstarsys.com; upgrade-insecure-requests"
  Header set X-Content-Type-Options: nosniff
  Header set Referrer-Policy: strict-origin
  Header set X-Frame-Options: SAMEORIGIN
</IfModule>

<VirtualHost *:80>
  Protocol h2c
  ServerAdmin webmaster@localhost
  DocumentRoot /src/www/content
  AddOutputFilter INCLUDES .html
  ServerName localhost
  Alias /editor.md /src/editor.md
  Alias /fontawesome /src/fontawesome
</VirtualHost>

<Directory /src/www>
 AllowOverride all
 RemoveType .gz
</Directory>

<Directory /src/www/content>
  Options Indexes MultiViews IncludesNoExec
  Require all granted
</Directory>
<Directory /src/editor.md>
  Options Indexes MultiViews IncludesNoExec
  Require all granted
</Directory>
<Directory /src/fontawesome>
  Options Indexes MultiViews IncludesNoExec
  Require all granted
</Directory>
